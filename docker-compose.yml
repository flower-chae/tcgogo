services:
  postgres:
    image: postgres:16-alpine
    container_name: deepagent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deepagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deepagent1234}
      POSTGRES_DB: ${POSTGRES_DB:-deepagent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deepagent} -d ${POSTGRES_DB:-deepagent}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
